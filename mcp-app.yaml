name: inventory-manager
description: Inventory management system with multi-location tracking, categories, and transaction history
version: "1.0.0"
icon: "📦"

backend:
  type: python
  command: "uvicorn src.main:app --host 0.0.0.0 --port 8080"
  build: "pip install -r requirements.txt"
  port: 8080
  health_path: /health
  required_files:
    - production.config.yaml
  writable_paths:
    - data/
  env:
    INV_CONFIG_PATH: production.config.yaml

frontend:
  type: react
  dir: frontend
  build: "npm ci && npm run build"
  output_dir: frontend/dist
  spa_mode: true

resources:
  databases:
    - name: main
      type: sqlite
      db_name: data/inventory.db